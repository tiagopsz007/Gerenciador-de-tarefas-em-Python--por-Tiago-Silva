name: Testes Python

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar código
      uses: actions/checkout@v3

    - name: Instalar Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Instalar dependências
      run: pip install pytest mysql-connector-python

    - name: Rodar testes
      run: cd "gerenciador de tarefas/tests" && python -m pytest test_app.py -v
